<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scoring the Course — EGSnrc Training Feedback</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
      max-width: 480px;
      width: 100%;
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #e8f0fe;
      color: #3a5bbf;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 99px;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-size: 1.45rem;
      color: #1a2340;
      line-height: 1.3;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.92rem;
      color: #6b7a99;
      margin-bottom: 2rem;
    }

    .qr-placeholder {
      width: 220px;
      height: 220px;
      margin: 0 auto 1.8rem;
      background: #f7f9fc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: #9aaac4;
      font-size: 0.8rem;
    }

    .qr-placeholder svg {
      opacity: 0.4;
    }

    .divider {
      font-size: 0.78rem;
      color: #b0bdd6;
      margin-bottom: 1.4rem;
      letter-spacing: 0.05em;
    }

    .url-box {
      background: #f0f4f8;
      border-radius: 10px;
      padding: 0.9rem 1.2rem;
      margin-bottom: 1.2rem;
      font-size: 0.88rem;
      color: #6b7a99;
      word-break: break-all;
    }

    .url-box a {
      display: block;
      font-size: 1.15rem;
      font-weight: 700;
      color: #3a5bbf;
      text-decoration: none;
      margin-top: 0.2rem;
      letter-spacing: 0.01em;
    }

    .url-box a:hover { text-decoration: underline; }

    .cta {
      display: inline-block;
      background: #3a5bbf;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      transition: background 0.2s;
    }

    .cta:hover { background: #2d48a0; }

    .footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #b0bdd6;
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="badge">Saõ Paulo · 2026</div>

    <h1>EGSnrc course feedback</h1>
    <p class="subtitle">Participant survey</p>

    <div class="qr-placeholder">
    <img src="./EGSnrc-course-feedback-qr.svg"/>
    </div>

    <p class="divider">— or click on the link below —</p>

    <div class="url-box">
      Survey link
      <a href="https://tinyurl.com/egsnrc-course-feedback" target="_blank">
        tinyurl.com/egsnrc-course-feedback
      </a>
    </div>

    <a class="cta" href="https://egsnrc-course-feedback" target="_blank">
      Take the Survey →
    </a>

    <p class="footer">Takes ~5 minutes &nbsp;·&nbsp; Anonymous &nbsp;·&nbsp; Thank you!</p>

  </div>
</body>
</html>
